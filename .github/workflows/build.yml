name: BuildModJar
on: [push, workflow_dispatch]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle System
        uses: gradle/actions/setup-gradle@v4

      - name: Force Downgrade to Compatible Gradle Version
        run: gradle wrapper --gradle-version 8.5

      - name: Initialize Script Permissions
        run: chmod +x gradlew

      - name: Run Build Compiler
        run: ./gradlew build

      - name: Package Output Jar
        uses: actions/upload-artifact@v4
        with:
          name: AdvanceRepair-Jar
          path: build/libs/*.jar
          
